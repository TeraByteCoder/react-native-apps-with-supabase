<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kinetic Coach – Registration</title><style>

xt);padding:15px 16px;font:inherit}.hint{color:var(--muted)}.overview-head{display:flex;justify-content:space-between;align-items:start;gap:16px}.sync{border:1px solid var(--line);background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:8px 12px;font-size:11px;font-weight:900;letter-spacing:1px}.workouts{display:grid;gap:12px;margin-top:18px}.workout{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:18px}.dot{width:42px;height:42px;border-radius:999px;background:var(--accent)}.grow{flex:1}.grow strong{display:block;font-size:18px}.grow span{color:var(--muted)}.tag{border-radius:999px;padding:7px 12px;background:#1f3343;color:#9bd3ff;font-size:11px;font-weight:900;text-transform:uppercase}pre{white-space:pre-wrap;color:var(--muted)}
